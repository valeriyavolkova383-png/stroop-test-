<script>
function startTest() {
  alert("ТЕСТ ЗАПУЩЕНО");
  document.getElementById("test").style.display = "block";
}
const colors = ["red", "blue", "green", "yellow"];

const colorUA = {
  red: "Червоний",
  blue: "Синій",
  green: "Зелений",
  yellow: "Жовтий"
};

let question = 0;
let correct = 0;
const total = 20;

let stage = 1;

let currentColor = "";
let currentWord = "";

let globalTime = 0;
let globalTimer;
let questionTimer;

const TOKEN = 717297177:AAH7l7EW3-Mz7_oOXLup4wAKNGJTUtpGZ0E;
const CHAT_ID = 8717297177; // 

function startTest() {
  const name = document.getElementById("name").value.trim();
  if (!name) return alert("Введи ім'я!");

  document.getElementById("test").style.display = "block";

  startGlobalTimer();
  newWord();
}

function startGlobalTimer() {
  globalTimer = setInterval(() => {
    globalTime++;
    document.getElementById("timer").innerText = "Час: " + globalTime + " сек";
  }, 1000);
}

function newWord() {
  clearInterval(questionTimer);

  if (question >= total) {
    finishTest();
    return;
  }

  let text = colors[Math.floor(Math.random() * colors.length)];
  let color = colors[Math.floor(Math.random() * colors.length)];

  currentColor = color;
  currentWord = text;

  document.getElementById("word").innerText = colorUA[text];
  document.getElementById("word").style.color = color;

  stage = question < total / 2 ? 1 : 2;
  renderButtons();

  question++;
  startQuestionTimer();
}

function startQuestionTimer() {
  let timeLeft = 5;
  clearInterval(questionTimer);

  questionTimer = setInterval(() => {
    if (timeLeft < 0) {
      clearInterval(questionTimer);
      newWord();
      return;
    }

    document.getElementById("timer").innerText = "Час: " + timeLeft + " сек";
    timeLeft--;
  }, 1000);
}

function renderButtons() {
  if (stage === 1) {
    document.getElementById("stageText").innerText = "Етап 1: Колір";

    document.getElementById("buttons").innerHTML = `
      <button onclick="checkColor('red')">Червоний</button>
      <button onclick="checkColor('blue')">Синій</button>
      <button onclick="checkColor('green')">Зелений</button>
      <button onclick="checkColor('yellow')">Жовтий</button>
    `;
  } else {
    document.getElementById("stageText").innerText = "Етап 2: Слово";

    document.getElementById("buttons").innerHTML = `
      <button onclick="checkWord('red')">Червоний</button>
      <button onclick="checkWord('blue')">Синій</button>
      <button onclick="checkWord('green')">Зелений</button>
      <button onclick="checkWord('yellow')">Жовтий</button>
    `;
  }
}

function checkColor(ans) {
  clearInterval(questionTimer);
  if (stage === 1 && ans === currentColor) correct++;
  newWord();
}

function checkWord(ans) {
  clearInterval(questionTimer);
  if (stage === 2 && ans === currentWord) correct++;
  newWord();
}

function finishTest() {
  clearInterval(globalTimer);

  document.getElementById("word").innerText = "ЗАВЕРШЕНО";

  const name = document.getElementById("name").value;

  sendToTelegram({
    name,
    score: correct,
    total,
    time: globalTime
  });
}

function sendToTelegram(data) {
  const text =
`🧠 Тест Струпа
👤 Ім'я: ${data.name}
✅ Результат: ${data.score}/${data.total}
⏱ Час: ${data.time} сек`;

  fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text: text
    })
  })
  .then(r => r.json())
  .then(r => console.log("OK", r))
  .catch(e => console.error("ERROR", e));
}
</script>
