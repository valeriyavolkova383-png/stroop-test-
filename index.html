<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Тест Струпа</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    margin-top: 60px;
  }

  #word {
    font-size: 60px;
    font-weight: bold;
    margin: 40px;
  }

  button {
    font-size: 18px;
    margin: 8px;
    padding: 10px 15px;
    cursor: pointer;
  }

  input {
    font-size: 18px;
    padding: 8px;
  }

  #timer {
    font-size: 18px;
    margin: 10px;
  }
</style>
</head>

<body>

<h1>Тест Струпа</h1>

<p>Введи ім’я:</p>
<input type="text" id="name">

<br><br>
<button onclick="startTest()">Почати</button>

<div id="test" style="display:none;">
  <h3 id="stageText"></h3>
  <p id="timer">Час: 0 сек</p>
  <div id="word">ГОТОВО</div>
  <div id="buttons"></div>
  <p id="info"></p>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxoAzVpB5yy0OA318rBwkoDt4Kob1fQ-KjwAzlf4H7OWnmAjEXRhF8bKL0a56SLQr7I/exec";

const colors = ["red", "blue", "green", "yellow"];

const colorUA = {
  red: "Червоний",
  blue: "Синій",
  green: "Зелений",
  yellow: "Жовтий"
};

let question = 0;
let correct = 0;
const total = 20;

let stage = 1;

let currentColor = "";
let currentWord = "";

let globalTime = 0;
let questionTime = 5;

let globalTimer;
let questionTimer;

function startTest() {
  const name = document.getElementById("name").value.trim();
  if (!name) {
    alert("Введи ім’я!");
    return;
  }

  document.getElementById("test").style.display = "block";

  startGlobalTimer();
  newWord();
}

function startGlobalTimer() {
  globalTimer = setInterval(() => {
    globalTime++;
    document.getElementById("timer").innerText =
      "Загальний час: " + globalTime + " сек";
  }, 1000);
}

function startQuestionTimer() {
  let timeLeft = questionTime;

  clearInterval(questionTimer);

  questionTimer = setInterval(() => {
    if (timeLeft < 0) {
      clearInterval(questionTimer);
      document.getElementById("info").innerText = "Час вийшов!";
      newWord();
      return;
    }

    document.getElementById("timer").innerText =
      "Час на відповідь: " + timeLeft + " сек";

    timeLeft--;
  }, 1000);
}

function renderButtons(stage) {
  if (stage === 1) {
    document.getElementById("stageText").innerText =
      "Етап 1: Вибери КОЛІР";

    document.getElementById("buttons").innerHTML = `
      <button onclick="checkColor('red')">Червоний</button>
      <button onclick="checkColor('blue')">Синій</button>
      <button onclick="checkColor('green')">Зелений</button>
      <button onclick="checkColor('yellow')">Жовтий</button>
    `;
  } else {
    document.getElementById("stageText").innerText =
      "Етап 2: Вибери СЛОВО";

    document.getElementById("buttons").innerHTML = `
      <button onclick="checkWord('red')">Червоний</button>
      <button onclick="checkWord('blue')">Синій</button>
      <button onclick="checkWord('green')">Зелений</button>
      <button onclick="checkWord('yellow')">Жовтий</button>
    `;
  }
}

function newWord() {
  clearInterval(questionTimer);

  if (question >= total) {
    finishTest();
    return;
  }

  let text = colors[Math.floor(Math.random() * colors.length)];
  let color = colors[Math.floor(Math.random() * colors.length)];

  currentColor = color;
  currentWord = text;

  document.getElementById("word").innerText = colorUA[text];
  document.getElementById("word").style.color = color;

  if (question < total / 2) {
    stage = 1;
    renderButtons(1);
  } else {
    stage = 2;
    renderButtons(2);
  }

  question++;
  startQuestionTimer();
}

function checkColor(answer) {
  clearInterval(questionTimer);

  if (stage === 1 && answer === currentColor) {
    correct++;
  }

  updateInfo();
  newWord();
}

function checkWord(answer) {
  clearInterval(questionTimer);

  if (stage === 2 && answer === currentWord) {
    correct++;
  }

  updateInfo();
  newWord();
}

function updateInfo() {
  document.getElementById("info").innerText =
    `Рахунок: ${correct} / ${question}`;
}

function finishTest() {
  clearInterval(globalTimer);
  document.getElementById("word").innerText = "ЗАВЕРШЕНО";

  const name = document.getElementById("name").value;

  const data = {
    name: name,
    score: correct,
    total: total,
    time: globalTime
  };

  sendToGoogle(data);
}

function sendToGoogle(data) {
  fetch(URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    console.log("Успішно:", res);
    document.getElementById("info").innerText += " | Дані збережено ✅";
  })
  .catch(err => {
    console.error("Помилка:", err);
    document.getElementById("info").innerText += " | Помилка збереження ❌";
  });
}
</script>

</body>
</html>
