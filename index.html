<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Тест Струпа</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    margin-top: 60px;
  }

  #word {
    font-size: 60px;
    font-weight: bold;
    margin: 40px;
  }

  button {
    font-size: 18px;
    margin: 8px;
    padding: 10px 15px;
    cursor: pointer;
  }

  input {
    font-size: 18px;
    padding: 8px;
  }

  #timer {
    font-size: 18px;
    margin: 10px;
  }
</style>
</head>

<body>

<h1>Тест Струпа</h1>

<p>Введи ім’я:</p>
<input type="text" id="name">

<br><br>
<button onclick="startTest()">Почати</button>

<div id="test" style="display:none;">

  <h3 id="stageText"></h3>

  <p id="timer">Час: 0 сек</p>

  <div id="word">ГОТОВО</div>

  <div id="buttons"></div>

  <p id="info"></p>
  <p id="score"></p>

</div>

<script>
const colors = ["red", "blue", "green", "yellow"];

const colorUA = {
  red: "Червоний",
  blue: "Синій",
  green: "Зелений",
  yellow: "Жовтий"
};

let question = 0;
let correct = 0;
const total = 20;

let stage = 1;

let currentColor = "";
let currentWord = "";

let globalTime = 0;
let questionTime = 5;

let globalTimer;
let questionTimer;

function startTest() {
  document.getElementById("test").style.display = "block";

  startGlobalTimer();
  newWord();
}

function startGlobalTimer() {
  globalTimer = setInterval(() => {
    globalTime++;
    document.getElementById("timer").innerText =
      "Час: " + globalTime + " сек";
  }, 1000);
}

function startQuestionTimer() {
  let timeLeft = questionTime;

  clearInterval(questionTimer);

  questionTimer = setInterval(() => {

    if (timeLeft < 0) {
      clearInterval(questionTimer);
      document.getElementById("info").innerText = "Час вийшов!";
      newWord();
      return;
    }

    document.getElementById("timer").innerText =
      "Час на відповідь: " + timeLeft + " сек";

    timeLeft--;

  }, 1000);
}

function renderButtons(stage) {

  if (stage === 1) {
    document.getElementById("stageText").innerText =
      "Етап 1: Колір слова";

    document.getElementById("buttons").innerHTML = `
      <button onclick="checkColor('red')">Червоний</button>
      <button onclick="checkColor('blue')">Синій</button>
      <button onclick="checkColor('green')">Зелений</button>
      <button onclick="checkColor('yellow')">Жовтий</button>
    `;
  } else {
    document.getElementById("stageText").innerText =
      "Етап 2: Значення слова";

    document.getElementById("buttons").innerHTML = `
      <button onclick="checkWord('red')">Червоний</button>
      <button onclick="checkWord('blue')">Синій</button>
      <button onclick="checkWord('green')">Зелений</button>
      <button onclick="checkWord('yellow')">Жовтий</button>
    `;
  }
}

function newWord() {

  clearInterval(questionTimer);

  if (question >= total) {

    clearInterval(globalTimer);

    document.getElementById("word").innerText = "ЗАВЕРШЕНО";

    let name = document.getElementById("name").value;

    fetch("https://script.google.com/macros/s/AKfycbzjWJbsT3JU8a-Ky08QxNUXWUXu4wkw4sQHdTxgl7_j0mVaaquXElGMsdJ1uUtWVHvz/exec", {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: name,
        score: correct,
        total: total,
        time: globalTime
      })
    });

    return;
  }

  let text = colors[Math.floor(Math.random() * colors.length)];
  let color = colors[Math.floor(Math.random() * colors.length)];

  currentColor = color;
  currentWord = text;

  document.getElementById("word").innerText = colorUA[text];
  document.getElementById("word").style.color = color;

  if (question < total / 2) {
    stage = 1;
    renderButtons(1);
  } else {
    stage = 2;
    renderButtons(2);
  }

  question++;

  startQuestionTimer();
}

function checkColor(answer) {

  clearInterval(questionTimer);

  if (stage !== 1) return;

  if (answer === currentColor) correct++;

  document.getElementById("info").innerText =
    "Рахунок: " + correct + " / " + question;

  newWord();
}function checkWord(answer) {

  clearInterval(questionTimer);

  if (stage !== 2) return;

  if (answer === currentWord) correct++;

  document.getElementById("info").innerText =
    "Рахунок: " + correct + " / " + question;

  newWord();
}
</script>

</body>
</html>
