<script>
const colors = ["red", "blue", "green", "yellow"];

const colorUA = {
  red: "Червоний",
  blue: "Синій",
  green: "Зелений",
  yellow: "Жовтий"
};

let question = 0;
let correct = 0;
const total = 20;

let stage = 1;

let currentColor = "";
let currentWord = "";

let globalTime = 0;
let questionTime = 5;

let globalTimer;
let questionTimer;

// 🔑 TELEGRAM (ВСТАВ СЮДИ СВОЇ ДАНІ)
const TOKEN = "ТВІЙ_TOKEN";
const CHAT_ID = "ТВІЙ_CHAT_ID";

function startTest() {
  const name = document.getElementById("name").value.trim();
  if (!name) return alert("Введи ім'я!");

  document.getElementById("test").style.display = "block";

  startGlobalTimer();
  newWord();
}

function startGlobalTimer() {
  globalTimer = setInterval(() => {
    globalTime++;
    document.getElementById("timer").innerText =
      "Час: " + globalTime + " сек";
  }, 1000);
}

function startQuestionTimer() {
  let timeLeft = questionTime;
  clearInterval(questionTimer);

  questionTimer = setInterval(() => {
    if (timeLeft < 0) {
      clearInterval(questionTimer);
      newWord();
      return;
    }

    document.getElementById("timer").innerText =
      "Час: " + timeLeft + " сек";

    timeLeft--;
  }, 1000);
}

function renderButtons(stage) {
  if (stage === 1) {
    document.getElementById("stageText").innerText = "Етап 1: Колір";

    document.getElementById("buttons").innerHTML = `
      <button onclick="checkColor('red')">Червоний</button>
      <button onclick="checkColor('blue')">Синій</button>
      <button onclick="checkColor('green')">Зелений</button>
      <button onclick="checkColor('yellow')">Жовтий</button>
    `;
  } else {
    document.getElementById("stageText").innerText = "Етап 2: Слово";

    document.getElementById("buttons").innerHTML = `
      <button onclick="checkWord('red')">Червоний</button>
      <button onclick="checkWord('blue')">Синій</button>
      <button onclick="checkWord('green')">Зелений</button>
      <button onclick="checkWord('yellow')">Жовтий</button>
    `;
  }
}

function newWord() {
  clearInterval(questionTimer);

  if (question >= total) {
    finishTest();
    return;
  }

  let text = colors[Math.floor(Math.random() * colors.length)];
  let color = colors[Math.floor(Math.random() * colors.length)];

  currentColor = color;
  currentWord = text;

  document.getElementById("word").innerText = colorUA[text];
  document.getElementById("word").style.color = color;

  stage = question < total / 2 ? 1 : 2;
  renderButtons(stage);

  question++;
  startQuestionTimer();
}

function checkColor(answer) {
  clearInterval(questionTimer);

  if (stage === 1 && answer === currentColor) correct++;

  updateInfo();
  newWord();
}

function checkWord(answer) {
  clearInterval(questionTimer);

  if (stage === 2 && answer === currentWord) correct++;

  updateInfo();
  newWord();
}

function updateInfo() {
  document.getElementById("info").innerText =
    `Рахунок: ${correct} / ${question}`;
}

function finishTest() {
  clearInterval(globalTimer);

  document.getElementById("word").innerText = "ЗАВЕРШЕНО";

  const name = document.getElementById("name").value;

  sendToTelegram({
    name,
    score: correct,
    total,
    time: globalTime
  });
}

function sendToTelegram(data) {
  const text =
`🧠 Тест Струпа

👤 Ім'я: ${data.name}
✅ Результат: ${data.score}/${data.total}
⏱ Час: ${data.time} сек`;

  fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text: text
    })
  })
  .then(res => res.json())
  .then(res => console.log("OK:", res))
  .catch(err => console.error("ERROR:", err));
}
</script>
